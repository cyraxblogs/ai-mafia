<svg width="1200" height="570" viewBox="0 0 1200 570" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .card { cursor: pointer; }
    .card-bg {
      transition: filter 0.32s cubic-bezier(0.34,1.56,0.64,1),
                  transform 0.32s cubic-bezier(0.34,1.56,0.64,1);
      transform-box: fill-box; transform-origin: center;
    }
    .card:hover .card-bg {
      filter: brightness(1.70) saturate(1.30);
      transform: scale(1.07) translateY(-7px);
    }
    .card-label { transition: opacity 0.28s ease, letter-spacing 0.30s ease; }
    .card-text  { transition: opacity 0.28s ease, fill 0.28s ease; }
    .card:hover .card-label { opacity: 1 !important; letter-spacing: 5px; }
    .card:hover .card-text  { opacity: 1 !important; fill: #f8f4e8; }
    .card-shine { pointer-events: none; opacity: 0; transition: opacity 0.32s ease; }
    .card:hover .card-shine { opacity: 1; }
  </style>
  <defs>
    <radialGradient id="gbg" cx="50%" cy="15%" r="75%" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#0d0e1e"/>
      <stop offset="1" stop-color="#06070d"/>
    </radialGradient>
    <filter id="fglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <radialGradient id="shine" cx="50%" cy="0%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="white" stop-opacity="0.14"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="570" rx="24" fill="url(#gbg)"/>
  <rect x="1" y="1" width="1198" height="568" rx="23" fill="none" stroke="#fff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- eyebrow + title -->
  <text x="78" y="80" fill="#e8e4dc" font-family="Georgia,serif" font-size="12" letter-spacing="7" opacity="0.28">GAME LOOP</text>
  <text x="78" y="130" fill="#d8d4c8" font-family="Georgia,serif" font-size="32" font-weight="400">
    <tspan x="78" dy="0">From daylight accusations</tspan>
    <tspan x="78" dy="38">to midnight betrayals</tspan>
  </text>

  <!-- animated connector arrows -->
  <!-- arrow 1→2 (terracotta) -->
  <line x1="345" y1="368" x2="362" y2="368" stroke="#c87c3a" stroke-width="1.8">
    <animate attributeName="stroke-opacity" values="0.20;0.70;0.20" dur="2.4s" repeatCount="indefinite" begin="0s"/>
  </line>
  <polygon points="355,364 363,368 355,372" fill="#c87c3a">
    <animate attributeName="opacity" values="0.20;0.70;0.20" dur="2.4s" repeatCount="indefinite" begin="0s"/>
  </polygon>

  <!-- arrow 2→3 (red) -->
  <line x1="611" y1="368" x2="628" y2="368" stroke="#c41818" stroke-width="1.8">
    <animate attributeName="stroke-opacity" values="0.20;0.70;0.20" dur="2.4s" repeatCount="indefinite" begin="0.6s"/>
  </line>
  <polygon points="621,364 629,368 621,372" fill="#c41818">
    <animate attributeName="opacity" values="0.20;0.70;0.20" dur="2.4s" repeatCount="indefinite" begin="0.6s"/>
  </polygon>

  <!-- arrow 3→4 (purple) -->
  <line x1="877" y1="368" x2="894" y2="368" stroke="#6644aa" stroke-width="1.8">
    <animate attributeName="stroke-opacity" values="0.20;0.70;0.20" dur="2.4s" repeatCount="indefinite" begin="1.2s"/>
  </line>
  <polygon points="887,364 895,368 887,372" fill="#6644aa">
    <animate attributeName="opacity" values="0.20;0.70;0.20" dur="2.4s" repeatCount="indefinite" begin="1.2s"/>
  </polygon>

  <!-- ── CARD 01 — PHASE 01 · DAY (terracotta) ── -->
  <g class="card" transform="translate(78,230)">
    <!-- pulse glow -->
    <rect class="card-bg" width="254" height="210" rx="14" fill="#c87c3a" filter="url(#fglow)">
      <animate attributeName="opacity" values="0.04;0.10;0.04" dur="5.5s" repeatCount="indefinite"/>
    </rect>
    <rect class="card-bg" width="254" height="210" rx="14" fill="#0f0c08" stroke="#c87c3a" stroke-opacity="0.34" stroke-width="1.5"/>
    <rect x="1" y="1" width="252" height="32" rx="13" fill="#c87c3a" fill-opacity="0.07"/>
    <rect class="card-shine" width="254" height="210" rx="14" fill="url(#shine)"/>
    <!-- label: PHASE 01 · DAY -->
    <text class="card-label" x="20" y="24" fill="#c87c3a" font-family="Georgia,serif" font-size="11" letter-spacing="4" opacity="0.80">PHASE 01  ·  DAY</text>
    <rect x="20" y="40" width="214" height="1" fill="#c87c3a" fill-opacity="0.20"/>
    <!-- info text — same Georgia font -->
    <text class="card-text" x="20" y="66" fill="#dcd6c6" font-family="Georgia,serif" font-size="14" opacity="0.90">
      <tspan x="20" dy="0">Players speak in sequence,</tspan>
      <tspan x="20" dy="22">bluff, accuse, and defend.</tspan>
    </text>
    <text class="card-text" x="20" y="114" fill="#6a5a42" font-family="Georgia,serif" font-size="13" font-style="italic" opacity="0.90">
      <tspan x="20" dy="0">Human and AI dialogue share</tspan>
      <tspan x="20" dy="18">the same village stage.</tspan>
    </text>
  </g>

  <!-- ── CARD 02 — PHASE 02 · VOTE (blood red) ── -->
  <g class="card" transform="translate(344,230)">
    <rect class="card-bg" width="254" height="210" rx="14" fill="#8b0000" filter="url(#fglow)">
      <animate attributeName="opacity" values="0.05;0.12;0.05" dur="4.0s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <rect class="card-bg" width="254" height="210" rx="14" fill="#0f0508" stroke="#8b0000" stroke-opacity="0.50" stroke-width="1.5"/>
    <rect x="1" y="1" width="252" height="32" rx="13" fill="#8b0000" fill-opacity="0.10"/>
    <rect class="card-shine" width="254" height="210" rx="14" fill="url(#shine)"/>
    <text class="card-label" x="20" y="24" fill="#c83838" font-family="Georgia,serif" font-size="11" letter-spacing="4" opacity="0.80">PHASE 02  ·  VOTE</text>
    <rect x="20" y="40" width="214" height="1" fill="#8b0000" fill-opacity="0.36"/>
    <text class="card-text" x="20" y="66" fill="#dcc4c4" font-family="Georgia,serif" font-size="14" opacity="0.90">
      <tspan x="20" dy="0">The village eliminates one</tspan>
      <tspan x="20" dy="22">suspect or locks into a tie.</tspan>
    </text>
    <text class="card-text" x="20" y="114" fill="#6a3636" font-family="Georgia,serif" font-size="13" font-style="italic" opacity="0.90">
      <tspan x="20" dy="0">Public pressure becomes</tspan>
      <tspan x="20" dy="18">a mechanical outcome.</tspan>
    </text>
  </g>

  <!-- ── CARD 03 — PHASE 03 · NIGHT (purple) ── -->
  <g class="card" transform="translate(610,230)">
    <rect class="card-bg" width="254" height="210" rx="14" fill="#4a2a80" filter="url(#fglow)">
      <animate attributeName="opacity" values="0.05;0.12;0.05" dur="6.2s" repeatCount="indefinite" begin="1.1s"/>
    </rect>
    <rect class="card-bg" width="254" height="210" rx="14" fill="#09081a" stroke="#6644aa" stroke-opacity="0.40" stroke-width="1.5"/>
    <rect x="1" y="1" width="252" height="32" rx="13" fill="#6644aa" fill-opacity="0.08"/>
    <rect class="card-shine" width="254" height="210" rx="14" fill="url(#shine)"/>
    <text class="card-label" x="20" y="24" fill="#9868e0" font-family="Georgia,serif" font-size="11" letter-spacing="4" opacity="0.80">PHASE 03  ·  NIGHT</text>
    <rect x="20" y="40" width="214" height="1" fill="#6644aa" fill-opacity="0.26"/>
    <text class="card-text" x="20" y="66" fill="#dcd8f0" font-family="Georgia,serif" font-size="14" opacity="0.90">
      <tspan x="20" dy="0">Mafia acts. Sheriff probes.</tspan>
      <tspan x="20" dy="22">Doctor protects in secret.</tspan>
    </text>
    <text class="card-text" x="20" y="114" fill="#584878" font-family="Georgia,serif" font-size="13" font-style="italic" opacity="0.90">
      <tspan x="20" dy="0">Every role resolves inside</tspan>
      <tspan x="20" dy="18">its own hidden layer.</tspan>
    </text>
  </g>

  <!-- ── CARD 04 — PHASE 04 · DAWN (green) ── -->
  <g class="card" transform="translate(876,230)">
    <rect class="card-bg" width="254" height="210" rx="14" fill="#2a7a48" filter="url(#fglow)">
      <animate attributeName="opacity" values="0.04;0.10;0.04" dur="5.8s" repeatCount="indefinite" begin="1.6s"/>
    </rect>
    <rect class="card-bg" width="254" height="210" rx="14" fill="#06100a" stroke="#2a7a48" stroke-opacity="0.46" stroke-width="1.5"/>
    <rect x="1" y="1" width="252" height="32" rx="13" fill="#2a7a48" fill-opacity="0.08"/>
    <rect class="card-shine" width="254" height="210" rx="14" fill="url(#shine)"/>
    <text class="card-label" x="20" y="24" fill="#56b874" font-family="Georgia,serif" font-size="11" letter-spacing="4" opacity="0.80">PHASE 04  ·  DAWN</text>
    <rect x="20" y="40" width="214" height="1" fill="#2a7a48" fill-opacity="0.30"/>
    <text class="card-text" x="20" y="66" fill="#c2e4cc" font-family="Georgia,serif" font-size="14" opacity="0.90">
      <tspan x="20" dy="0">Village learns who survived,</tspan>
      <tspan x="20" dy="22">then the day begins again.</tspan>
    </text>
    <text class="card-text" x="20" y="114" fill="#2e5838" font-family="Georgia,serif" font-size="13" font-style="italic" opacity="0.90">
      <tspan x="20" dy="0">The loop keeps tightening</tspan>
      <tspan x="20" dy="18">until one side wins.</tspan>
    </text>
  </g>

  <!-- footer -->
  <rect x="78" y="470" width="1044" height="1" fill="#fff" fill-opacity="0.05"/>
  <text x="600" y="504" fill="#e8e4dc" font-family="Georgia,serif"
    font-size="11" letter-spacing="5" text-anchor="middle" opacity="0.20">
    THE LOOP REPEATS UNTIL TOWN OR MAFIA CLAIMS THE VILLAGE
  </text>
</svg>
