<svg width="1080" height="680" viewBox="0 0 1080 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ibg" cx="50%" cy="0%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#0d0e1c"/>
      <stop offset="1" stop-color="#06070d"/>
    </radialGradient>
    <filter id="iglow"  x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="pglow"  x="-80%" y="-80%" width="360%" height="360%"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="aglow"  x="-100%" y="-100%" width="400%" height="400%"><feGaussianBlur stdDeviation="5"/></filter>

    <!-- arrow A path: box1 right → box2 left (horizontal) -->
    <!-- Arrow B elbow: box2 bottom → box3 top -->
    <!-- Arrow C path: box3 right → box4 left (horizontal) -->

    <!-- dash flows for arrow strokes -->
    <marker id="arrowW"  markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#d0ccc2" opacity="0.65"/>
    </marker>
    <marker id="arrowR"  markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#c41818" opacity="0.70"/>
    </marker>
    <marker id="arrowG"  markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#2a7a48" opacity="0.70"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1080" height="680" rx="24" fill="url(#ibg)"/>
  <rect x="1" y="1" width="1078" height="678" rx="23" fill="none" stroke="#fff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- eyebrow + title -->
  <text x="78" y="76" fill="#e8e4dc" font-family="Georgia,serif" font-size="12" letter-spacing="7" opacity="0.28">INSTALLATION</text>
  <text x="78" y="128" fill="#d8d4c8" font-family="Georgia,serif" font-size="32">
    <tspan x="78" dy="0">Working local setup</tspan>
    <tspan x="78" dy="40">in four moves</tspan>
  </text>

  <!-- ══════════════════════════════════
       ANIMATED CONNECTOR: A (1→2 horizontal, neutral white)
       Path from right edge of box1 (528,316) to left edge of box2 (572,316)
  ══════════════════════════════════ -->

  <!-- flowing dashes: arrow A -->
  <line x1="529" y1="316" x2="570" y2="316" stroke="#d0ccc2" stroke-width="2" stroke-opacity="0" marker-end="url(#arrowW)"/>
  <line x1="529" y1="316" x2="570" y2="316"
    stroke="#d0ccc2" stroke-width="2"
    stroke-dasharray="6,6" stroke-linecap="round">
    <animate attributeName="stroke-opacity" values="0.15;0.65;0.15" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dashoffset" values="24;0" dur="0.6s" repeatCount="indefinite" calcMode="linear"/>
  </line>
  <!-- arrowhead pulse -->
  <polygon points="563,312 571,316 563,320" fill="#d0ccc2">
    <animate attributeName="opacity" values="0.20;0.72;0.20" dur="1.8s" repeatCount="indefinite"/>
  </polygon>
  <!-- glow dot traveling the arrow -->
  <circle cx="529" cy="316" r="3.5" fill="#ffffff" opacity="0">
    <animate attributeName="cx"      values="529;570;570" dur="1.8s" repeatCount="indefinite" keyTimes="0;0.85;1" calcMode="spline" keySplines="0.4 0 0.6 1;0 0 1 1"/>
    <animate attributeName="opacity" values="0;0.55;0"   dur="1.8s" repeatCount="indefinite" keyTimes="0;0.5;1"/>
    <animate attributeName="r"       values="3;5;2"      dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- ══════════════════════════════════
       ANIMATED CONNECTOR: B (2→3 elbow, red)
       Elbow: box2 bottom-center (797,406) → down (797,422) → left (301,422) → up into box3 top (301,440)
  ══════════════════════════════════ -->
  <path d="M797 407 L797 422 L301 422 L301 439"
    fill="none" stroke="#c41818" stroke-width="2" stroke-opacity="0"
    stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowR)"/>
  <path d="M797 407 L797 422 L301 422 L301 439"
    fill="none" stroke="#c41818" stroke-width="2"
    stroke-dasharray="8,7" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="stroke-opacity" values="0.18;0.60;0.18" dur="2.4s" repeatCount="indefinite" begin="0.4s"/>
    <animate attributeName="stroke-dashoffset" values="90;0" dur="1.4s" repeatCount="indefinite" calcMode="linear" begin="0.4s"/>
  </path>
  <!-- arrowhead B pulse -->
  <polygon points="297,432 301,440 305,432" fill="#c41818">
    <animate attributeName="opacity" values="0.18;0.65;0.18" dur="2.4s" repeatCount="indefinite" begin="0.4s"/>
  </polygon>
  <!-- glow dot traveling elbow -->
  <circle r="3.5" fill="#ff4040" opacity="0">
    <animateMotion path="M797 407 L797 422 L301 422 L301 439" dur="2.4s" repeatCount="indefinite" begin="0.4s" calcMode="spline" keySplines="0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0;0.60;0.60;0" dur="2.4s" repeatCount="indefinite" begin="0.4s" keyTimes="0;0.1;0.9;1"/>
    <animate attributeName="r"       values="3;5;5;2"       dur="2.4s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <!-- corner flash at elbow bend -->
  <circle cx="797" cy="422" r="5" fill="#c41818" filter="url(#aglow)" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="2.4s" repeatCount="indefinite" begin="0.75s"/>
  </circle>
  <circle cx="301" cy="422" r="5" fill="#c41818" filter="url(#aglow)" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="2.4s" repeatCount="indefinite" begin="1.2s"/>
  </circle>

  <!-- ══════════════════════════════════
       ANIMATED CONNECTOR: C (3→4 horizontal, green)
  ══════════════════════════════════ -->
  <line x1="529" y1="528" x2="570" y2="528" stroke="#2a7a48" stroke-width="2" stroke-opacity="0" marker-end="url(#arrowG)"/>
  <line x1="529" y1="528" x2="570" y2="528"
    stroke="#2a7a48" stroke-width="2"
    stroke-dasharray="6,6" stroke-linecap="round">
    <animate attributeName="stroke-opacity" values="0.18;0.70;0.18" dur="1.8s" repeatCount="indefinite" begin="0.8s"/>
    <animate attributeName="stroke-dashoffset" values="24;0" dur="0.6s"  repeatCount="indefinite" calcMode="linear" begin="0.8s"/>
  </line>
  <polygon points="563,524 571,528 563,532" fill="#2a7a48">
    <animate attributeName="opacity" values="0.20;0.78;0.20" dur="1.8s" repeatCount="indefinite" begin="0.8s"/>
  </polygon>
  <!-- glow dot C -->
  <circle cx="529" cy="528" r="3.5" fill="#44cc88" opacity="0">
    <animate attributeName="cx"      values="529;570;570" dur="1.8s" repeatCount="indefinite" begin="0.8s" keyTimes="0;0.85;1" calcMode="spline" keySplines="0.4 0 0.6 1;0 0 1 1"/>
    <animate attributeName="opacity" values="0;0.60;0"   dur="1.8s" repeatCount="indefinite" begin="0.8s" keyTimes="0;0.5;1"/>
    <animate attributeName="r"       values="3;5;2"      dur="1.8s" repeatCount="indefinite" begin="0.8s"/>
  </circle>

  <!-- ══════════════════════════════════
       STEP NODE INDICATORS (circle badges on each box top-right)
  ══════════════════════════════════ -->
  <!-- Node 1 (white) -->
  <circle cx="528" cy="228" r="14" fill="#0e0f1e" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.14;0.50;0.14" dur="3.0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="528" cy="228" r="14" fill="#ffffff" filter="url(#pglow)" opacity="0">
    <animate attributeName="opacity" values="0.03;0.12;0.03" dur="3.0s" repeatCount="indefinite"/>
  </circle>
  <text x="528" y="233" fill="#d0ccc2" font-family="Georgia,serif" font-size="12" font-weight="bold" text-anchor="middle">1</text>

  <!-- Node 2 (white dim) -->
  <circle cx="1022" cy="228" r="14" fill="#0c0d1a" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.08;0.30;0.08" dur="3.0s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <text x="1022" y="233" fill="#888490" font-family="Georgia,serif" font-size="12" font-weight="bold" text-anchor="middle">2</text>

  <!-- Node 3 (red) -->
  <circle cx="528" cy="440" r="14" fill="#0e0608" stroke="#c41818" stroke-opacity="0.44" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.22;0.68;0.22" dur="2.8s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle cx="528" cy="440" r="14" fill="#cc2020" filter="url(#pglow)" opacity="0">
    <animate attributeName="opacity" values="0.04;0.18;0.04" dur="2.8s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <text x="528" y="445" fill="#c83838" font-family="Georgia,serif" font-size="12" font-weight="bold" text-anchor="middle">3</text>

  <!-- Node 4 (green) -->
  <circle cx="1022" cy="440" r="14" fill="#06100a" stroke="#2a7a48" stroke-opacity="0.44" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.22;0.68;0.22" dur="3.4s" repeatCount="indefinite" begin="1.2s"/>
  </circle>
  <circle cx="1022" cy="440" r="14" fill="#2a9058" filter="url(#pglow)" opacity="0">
    <animate attributeName="opacity" values="0.04;0.18;0.04" dur="3.4s" repeatCount="indefinite" begin="1.2s"/>
  </circle>
  <text x="1022" y="445" fill="#56b874" font-family="Georgia,serif" font-size="12" font-weight="bold" text-anchor="middle">4</text>

  <!-- ══════════════════════════════════
       BOX 1 — REQUIREMENTS (white)
  ══════════════════════════════════ -->
  <g transform="translate(78,228)">
    <rect width="450" height="176" rx="12" fill="#ffffff" filter="url(#iglow)" opacity="0.015"/>
    <rect width="450" height="176" rx="12" fill="#0e0f1e" stroke="#ffffff" stroke-opacity="0.20" stroke-width="1.5"/>
    <rect x="1" y="1" width="448" height="33" rx="11" fill="#fff" fill-opacity="0.04"/>
    <text x="22" y="24" fill="#d8d4c8" font-family="Georgia,serif" font-size="12" letter-spacing="5" opacity="0.62">REQUIREMENTS</text>
    <rect x="22" y="42" width="406" height="1" fill="#fff" fill-opacity="0.07"/>
    <text x="22" y="74" fill="#c4c0b6" font-family="Georgia,serif" font-size="17">
      <tspan x="22" dy="0">Node.js 18 or newer</tspan>
      <tspan x="22" dy="27">npm 9 or newer</tspan>
      <tspan x="22" dy="27">Commonstack API key</tspan>
    </text>
  </g>

  <!-- ══════════════════════════════════
       BOX 2 — INSTALL (dim white)
  ══════════════════════════════════ -->
  <g transform="translate(572,228)">
    <rect width="450" height="176" rx="12" fill="#0c0d1a" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.5"/>
    <rect x="1" y="1" width="448" height="33" rx="11" fill="#fff" fill-opacity="0.02"/>
    <text x="22" y="24" fill="#d8d4c8" font-family="Georgia,serif" font-size="12" letter-spacing="5" opacity="0.34">INSTALL</text>
    <rect x="22" y="42" width="406" height="1" fill="#fff" fill-opacity="0.05"/>
    <!-- code block -->
    <rect x="22" y="55" width="196" height="40" rx="6" fill="#040508" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>
    <text x="38" y="80" fill="#c4d4c0" font-family="Courier New,monospace" font-size="17">npm install</text>
    <!-- scan line -->
    <rect x="24" y="57" width="192" height="2" rx="1" fill="#ffffff" opacity="0">
      <animate attributeName="y"       values="57;93;57"  dur="2.4s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="opacity" values="0;0.07;0;0.07;0" dur="2.4s" repeatCount="indefinite" begin="0.4s"/>
    </rect>
    <!-- cursor blink inside code block -->
    <rect x="130" y="66" width="2" height="18" rx="1" fill="#c4d4c0" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="1.0s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
    <text x="22" y="118" fill="#787480" font-family="Georgia,serif" font-size="15">
      <tspan x="22" dy="0">Installs Vite, Express, Three.js,</tspan>
      <tspan x="22" dy="22">GSAP, and runtime dependencies.</tspan>
    </text>
  </g>

  <!-- ══════════════════════════════════
       BOX 3 — RUN (red)
  ══════════════════════════════════ -->
  <g transform="translate(78,440)">
    <rect width="450" height="176" rx="12" fill="#8b0000" filter="url(#iglow)">
      <animate attributeName="opacity" values="0.03;0.08;0.03" dur="3.6s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
    <rect width="450" height="176" rx="12" fill="#0e0608" stroke="#8b0000" stroke-opacity="0.46" stroke-width="1.5"/>
    <rect x="1" y="1" width="448" height="33" rx="11" fill="#8b0000" fill-opacity="0.09"/>
    <text x="22" y="24" fill="#c83838" font-family="Georgia,serif" font-size="12" letter-spacing="5">RUN</text>
    <rect x="22" y="42" width="406" height="1" fill="#8b0000" fill-opacity="0.26"/>
    <!-- code block -->
    <rect x="22" y="55" width="212" height="40" rx="6" fill="#040204" stroke="#8b0000" stroke-opacity="0.18" stroke-width="1"/>
    <text x="38" y="80" fill="#d4b4b4" font-family="Courier New,monospace" font-size="17">npm run dev</text>
    <!-- scan line red -->
    <rect x="24" y="57" width="208" height="2" rx="1" fill="#cc2020" opacity="0">
      <animate attributeName="y"       values="57;93;57"    dur="2.1s" repeatCount="indefinite" begin="1.0s"/>
      <animate attributeName="opacity" values="0;0.12;0;0.12;0" dur="2.1s" repeatCount="indefinite" begin="1.0s"/>
    </rect>
    <!-- cursor blink -->
    <rect x="148" y="66" width="2" height="18" rx="1" fill="#d4b4b4" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="1.0s" repeatCount="indefinite" begin="0.7s"/>
    </rect>
    <text x="22" y="118" fill="#6a4040" font-family="Georgia,serif" font-size="15">
      <tspan x="22" dy="0">Starts Express on port 3001</tspan>
      <tspan x="22" dy="22">and Vite on port 5173.</tspan>
    </text>
  </g>

  <!-- ══════════════════════════════════
       BOX 4 — ENTER THE VILLAGE (green)
  ══════════════════════════════════ -->
  <g transform="translate(572,440)">
    <rect width="450" height="176" rx="12" fill="#2a7a48" filter="url(#iglow)">
      <animate attributeName="opacity" values="0.03;0.09;0.03" dur="4.2s" repeatCount="indefinite" begin="1.1s"/>
    </rect>
    <rect width="450" height="176" rx="12" fill="#06100a" stroke="#2a7a48" stroke-opacity="0.44" stroke-width="1.5"/>
    <rect x="1" y="1" width="448" height="33" rx="11" fill="#2a7a48" fill-opacity="0.08"/>
    <text x="22" y="24" fill="#56b874" font-family="Georgia,serif" font-size="12" letter-spacing="5">ENTER THE VILLAGE</text>
    <rect x="22" y="42" width="406" height="1" fill="#2a7a48" fill-opacity="0.26"/>
    <!-- checklist items with animated tick reveal -->
    <text x="22" y="74" fill="#b4dcbc" font-family="Georgia,serif" font-size="17">
      <tspan x="22" dy="0">Open localhost:5173</tspan>
      <tspan x="22" dy="27">Paste your API key</tspan>
      <tspan x="22" dy="27">Choose Play or Spectate</tspan>
    </text>
    <!-- animated dot pulses for each step -->
    <circle cx="12" cy="68" r="3" fill="#56b874">
      <animate attributeName="opacity" values="0.4;1.0;0.4" dur="3.0s" repeatCount="indefinite" begin="0.0s"/>
    </circle>
    <circle cx="12" cy="95" r="3" fill="#56b874">
      <animate attributeName="opacity" values="0.4;1.0;0.4" dur="3.0s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="12" cy="122" r="3" fill="#56b874">
      <animate attributeName="opacity" values="0.4;1.0;0.4" dur="3.0s" repeatCount="indefinite" begin="1.0s"/>
    </circle>
  </g>

  <!-- ══════════════════════════════════
       AMBIENT PARTICLE FIELD (faint dots drifting up between boxes)
  ══════════════════════════════════ -->
  <circle cx="548" cy="360" r="1.5" fill="#ffffff" opacity="0">
    <animate attributeName="cy"      values="380;310;310" dur="4s" repeatCount="indefinite" begin="0.2s"/>
    <animate attributeName="opacity" values="0;0.14;0"    dur="4s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle cx="554" cy="360" r="1" fill="#ffffff" opacity="0">
    <animate attributeName="cy"      values="360;290;290" dur="5s" repeatCount="indefinite" begin="1.4s"/>
    <animate attributeName="opacity" values="0;0.10;0"    dur="5s" repeatCount="indefinite" begin="1.4s"/>
  </circle>
  <circle cx="544" cy="360" r="1.2" fill="#ffffff" opacity="0">
    <animate attributeName="cy"      values="340;270;270" dur="3.8s" repeatCount="indefinite" begin="2.8s"/>
    <animate attributeName="opacity" values="0;0.12;0"    dur="3.8s" repeatCount="indefinite" begin="2.8s"/>
  </circle>
</svg>
